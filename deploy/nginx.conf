# Vhost for whymetasuck.nathanknowsnothing.co.uk
# Assumes the repo is cloned to /var/www/whymetasuck — adjust `root` if not.
#
# Cloudflare proxies this domain. If your Cloudflare SSL mode is "Full" (origin
# must serve HTTPS), copy the `listen 443 ssl` + certificate lines from your
# existing site's vhost into this server block. If it's "Flexible", port 80
# alone is enough.

server {
    listen 80;
    listen [::]:80;
    server_name whymetasuck.nathanknowsnothing.co.uk;

    root /var/www/whymetasuck;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bundle filename is content-hashed, so cache aggressively
    location ~* \.(js|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Don't serve repo internals
    location ~ /\.(git|github) {
        deny all;
    }
    location ~ ^/(README\.md|DEPLOY\.md|deploy/) {
        deny all;
    }
}
